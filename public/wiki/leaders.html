<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spacebiz Wiki — Empire Leaders</title>
    <style>
      :root {
        --bg: #070712;
        --panel: #111128;
        --border: rgba(0, 255, 204, 0.45);
        --text: #dbe8ff;
        --muted: #8ea7c8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(
          circle at top,
          #162043 0%,
          #0a0a1a 38%,
          var(--bg) 100%
        );
        color: var(--text);
        padding: 16px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 24px;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      .nav {
        margin-bottom: 12px;
      }
      .nav a {
        color: var(--muted);
        text-decoration: none;
        margin-right: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 10px;
      }
      .card {
        background: rgba(17, 17, 40, 0.94);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        display: block;
      }
      .meta {
        padding: 8px;
      }
      .meta strong {
        display: block;
        margin-bottom: 4px;
      }
      .meta span {
        color: var(--muted);
        font-size: 12px;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Empire Leader Directory</h1>
    <p>Faction leadership portraits and profile labels.</p>
    <div class="nav">
      <a href="./index.html">Wiki Home</a>
      <a href="./ceos.html">CEOs</a>
      <a href="./ships.html">Ships</a>
    </div>
    <div class="grid" id="grid"></div>

    <script>
      const leaders = [
        ["01", "Emperor Drakon", "Human • emperor"],
        ["02", "Empress Vasara", "Reptilian • emperor"],
        ["03", "The Convergence", "Insectoid • hiveMind"],
        ["04", "Mycelial Overmind", "Fungal • hiveMind"],
        ["05", "Archon Prime-7", "Cyborg • technocrat"],
        ["06", "Director Synthex", "Android • technocrat"],
        ["07", "Warmaster Kael", "Human • warlord"],
        ["08", "Broodmother Skrix", "Insectoid • warlord"],
        ["09", "Grand Financier Luxan", "Human • plutarch"],
        ["10", "Guildmaster Opaline", "Crystalline • plutarch"],
        ["11", "Speaker Aelith", "Avian • council"],
        ["12", "Delegate Consortium", "Cephalopod • council"],
        ["13", "Oracle Zetharion", "Ethereal • prophet"],
        ["14", "High Shaman Rootweave", "Plant • prophet"],
        ["15", "Overseer Vanguard", "Cyborg • overseer"],
        ["16", "Matriarch Ursane", "Ursine • overseer"],
        ["17", "Regent Solaxis", "Energy • emperor"],
        ["18", "Admiral Ferroclade", "Silicon • warlord"],
        ["19", "Shapelord Mirrax", "Shapeshifter • council"],
        ["20", "Primus Felinar", "Feline • plutarch"],
      ];
      const grid = document.getElementById("grid");
      for (const [id, name, meta] of leaders) {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <img src="../portraits/leaders/leader-${id}.png" alt="${name}" />
          <div class="meta">
            <strong>${name}</strong>
            <span>${meta}</span>
            <span>portrait id: leader-${id}</span>
          </div>
        `;
        grid.appendChild(card);
      }
    </script>
  </body>
</html>

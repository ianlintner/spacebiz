name: Deploy to Azure Static Web Apps

# Production deploys only. Quality gates for PRs live in ci.yml so this
# workflow doesn't run on pull_request events at all — the Azure SWA Free
# tier caps preview environments at 3, and PR previews here weren't being
# used for review (ci.yml is the gate). Removing the pull_request trigger
# avoids the recurring "max staging environments" failure on every PR.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gates and build
        run: npm run check
        env:
          # Audio is served from the CDN — public, fixed, no secret needed.
          VITE_AUDIO_BASE_URL: https://cdn.cat-herding.net/audio

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Point directly at the pre-built dist/ folder.
          # output_location must be empty string when app_location IS the output.
          app_location: "dist"
          output_location: ""
          skip_app_build: true

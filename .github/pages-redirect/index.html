<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Freight Tycoon — Moved</title>
    <!-- Instant JS redirect -->
    <script>
      location.replace("https://space-tycoon.cat-herding.net");
    </script>
    <!-- HTTP-equiv fallback (2s) if JS is disabled -->
    <meta
      http-equiv="refresh"
      content="2;url=https://space-tycoon.cat-herding.net"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #050a14;
        color: #7eb8d4;
        font-family: monospace;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        text-align: center;
        padding: 32px;
      }
      h1 {
        font-size: 1.1rem;
        letter-spacing: 6px;
        color: #7eb8d4;
        text-transform: uppercase;
      }
      p {
        font-size: 0.75rem;
        color: #3a5a70;
        letter-spacing: 2px;
      }
      a {
        color: #7eb8d4;
        text-decoration: none;
        border-bottom: 1px solid #3a5a70;
        padding-bottom: 2px;
      }
      a:hover {
        color: #fff;
        border-color: #7eb8d4;
      }
      .bar-track {
        width: 240px;
        height: 3px;
        background: #0d2033;
        position: relative;
        overflow: hidden;
      }
      .bar-fill {
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #3a8ab4, #7eb8d4);
        animation: slide 1.2s linear infinite;
      }
      @keyframes slide {
        to {
          left: 140%;
        }
      }
    </style>
  </head>
  <body>
    <h1>Star Freight Tycoon</h1>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <p>Redirecting to new home&hellip;</p>
    <p>
      <a href="https://space-tycoon.cat-herding.net"
        >space-tycoon.cat-herding.net</a
      >
    </p>
  </body>
</html>
